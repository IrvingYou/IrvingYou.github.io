<p>这是毕业的前一晚，也是我在315宿舍的最后一晚。好消息是，我即将告别嘎吱作响的床了。也许我会怀念它的。</p>
<p>在这个迷茫的节点，我想问未来的自己几个问题：</p>
<p>1.你找到自己感兴趣的方向了吗？</p>
<p>2.无论你是否找到了，你是怎么为之努力的?</p>
<p>3.你目前的生活是否大部分时间是安宁、平和、充实的，而非空虚痛苦的？</p>
<p>想到未来如果重新看见这番话，我便为将要逝去的时间而悲伤，或许也是为了自己的期许。</p>
<p>但我要努力寻找这些问题的答案。</p>
<p>I prey for my answers.</p>
